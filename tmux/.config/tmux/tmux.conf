# prefix を Ctrl+a に変更
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 設定リロード
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ウィンドウ・ペイン番号を1から始める
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# デフォルトシェルをzshに
set -g default-shell /usr/bin/zsh

# True color サポート
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# マウス操作を有効化
set -g mouse on

# コピーモードをviキーバインドに
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ペイン分割（現在のパスを引き継ぐ）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vimライクなペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインのリサイズ（繰り返し可）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# プラグイン
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 自動保存・自動復元
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'

# ステータスバー（Nordカラーテーマ）
set -g status-position top
set -g status-style "bg=#2e3440,fg=#d8dee9"
set -g status-left "#[bg=#88C0D0,fg=#2E3440,bold] #S #[bg=#2e3440,fg=#88C0D0]"
set -g status-left-length 20
set -g status-right "#[fg=#88C0D0,bg=#2e3440]#[bg=#88C0D0,fg=#2E3440,bold]  %H:%M "

set -g window-status-current-format "#[fg=#2e3440,bg=#394260]#[bg=#394260,fg=#769ff0,bold] #I #W #[fg=#394260,bg=#2e3440]"
set -g window-status-format "#[fg=#4c566a,bg=#2e3440] #I #W "
